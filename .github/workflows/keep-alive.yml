name: Keep Render alive

# Render free tier suspende el servicio web tras 15 min de inactividad y el
# primer request después tarda 30-60s en levantar el contenedor de cero. Para
# capturistas que abren la app móvil al llegar a un evento esto es UX
# inaceptable (la primera captura del día tira timeout). Este workflow hace
# ping a /health cada 13 min para mantenerlo despierto.
#
# Si migrás a Render Starter ($7/mes), borrar este workflow — el plan pago no
# duerme.
#
# Configuración necesaria:
#   Settings → Secrets and variables → Actions → Variables → "New repository variable"
#   Name:  RENDER_API_URL
#   Value: https://<tu-servicio>.onrender.com   (sin / final, sin /api)
#
# Si la variable no está seteada, el workflow falla con un mensaje claro en
# vez de pegarle a una URL random.

on:
  schedule:
    # Cada 13 min — no usar 5/10/15 para evitar colisión con la cola interna
    # de GitHub Actions (los crons de minuto redondo se retrasan más).
    - cron: '*/13 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Validar variable RENDER_API_URL
        env:
          URL: ${{ vars.RENDER_API_URL }}
        run: |
          if [ -z "$URL" ]; then
            echo "::error::Variable RENDER_API_URL no configurada (Settings → Variables → Actions)."
            exit 1
          fi
          echo "Target: $URL/health"

      - name: Ping /health
        env:
          URL: ${{ vars.RENDER_API_URL }}
        run: |
          # --fail: salida ≠ 0 si HTTP 4xx/5xx (Render contesta 503 mientras
          #         levanta el contenedor — preferimos verlo como fallo del
          #         ping y reintentar en el siguiente schedule, no enmascararlo).
          # --max-time 90: el cold start puede tardar 30-60s; 90s da margen.
          curl --fail --silent --show-error --max-time 90 "$URL/health"
          echo ""  # newline final para el log
