databases:
  - name: nicarunner-db
    plan: free
    region: oregon
    databaseName: nicarunner
    user: nicarunner

services:
  - type: web
    name: nicarunner-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__PostgresConnection
        fromDatabase:
          name: nicarunner-db
          property: connectionString
      # NO usar generateValue: true — un re-aprovisionamiento del Blueprint
      # (o un suspend/resume del servicio) regenera el valor e invalida todos
      # los JWT en uso, tirando las sesiones de capturistas en medio de una
      # carrera. Setearlo manualmente una sola vez desde el dashboard de
      # Render (Environment → Add) con `openssl rand -base64 64`. Ver
      # docs/render-setup.md.
      - key: Jwt__Key
        sync: false
      - key: Jwt__Issuer
        value: NicaRunner.Api
      - key: Jwt__Audience
        value: NicaRunner.Clients
      - key: Jwt__ExpiryMinutes
        value: "60"
      - key: Resend__ApiKey
        sync: false
      - key: Resend__FromEmail
        value: "NicaRunner <onboarding@resend.dev>"
      - key: Resend__Subject
        value: "Tu resultado en NicaRunner"
      - key: GoogleAuth__ClientId
        value: "450796447742-hi3dpbuo0i6k5jua6u31rqpgf7dpm06b.apps.googleusercontent.com"
      - key: Cors__AllowedOrigins__0
        sync: false
